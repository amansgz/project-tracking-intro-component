<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Project tracking intro component</title>

  <link rel="stylesheet" href="./css/main.css">

  <script src="./js/app.js" defer></script>
</head>

<body>
  <header class="header">

    <div class="container  header__container">

      <!-- Logo -->
      <img class="header__logo" src="./assets/images/logo.svg" alt="Logo" width="32" height="32">

      <!-- Main Navigation -->
      <nav class="nav  header__nav" aria-label="Main navigation">

        <!-- Mobile hamburger button -->
        <button class="nav__toggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false"
          aria-controls="main-menu">

          <img class="nav__toggle-icon  nav__toggle-icon--hamburger" src="./assets/images/icon-hamburger.svg" alt=""
            width="24" height="16" aria-hidden="true">

          <img class="nav__toggle-icon  nav__toggle-icon--close" src="./assets/images/icon-close.svg" alt="" width="20"
            height="20" aria-hidden="true">
        </button>

        <!-- Menu Navigation -->
        <ul class="nav__list" id="main-menu">
          <li class="nav__item">
            <a class="nav__link" href="#">Product</a>
          </li>
          <li class="nav__item">
            <a class="nav__link" href="#">Features</a>
          </li>
          <li class="nav__item">
            <a class="nav__link" href="#">Pricing</a>
          </li>
          <li class="nav__item  nav__item--divider" aria-hidden="true" role="separator"></li>
          <li class="nav__item">
            <a class="nav__link  nav__link--primary" href="#">Login</a>
          </li>
        </ul>

      </nav>

    </div>
  </header>




  <main>

    <!-- Intro section -->
    <section class="intro">

      <div class="container  intro__container">

        <!-- Background shape -->
        <div class="intro__background"></div>

        <!-- Intro Image -->
        <div class="intro__image">
          <img src="./assets/images/illustration-devices.svg" alt="" width="960" height="464" fetchpriority="high">
        </div>

        <!-- Intro Content -->
        <div class="intro__content">
          <!-- Tag -->
          <p class="intro__tag">
            <span class="intro__tag-pill">New</span>
            <span class="intro__tag-text">Monograph Dashboard</span>
          </p>

          <!-- Text -->
          <h1 class="intro__title">Powerful insights into your team</h1>
          <p class="intro__description">Project planning and time tracking for agile teams</p>

          <!-- CTA -->
          <div class="intro__cta">
            <a class="intro__cta-btn" href="#">Schedule a demo</a>
            <p class="intro__cta-text">to see a live preview</p>
          </div>
        </div>

      </div>

    </section>
  </main>
</body>

</html>
